<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rádio Palavra viva - WEB</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

header {
    background: linear-gradient(red, blue, purple);
    padding: 20px;
}

button {
    padding: 10px;
    background: red;
    color: white;
    border: none;
    margin: 5px;
    cursor: pointer;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

.section {
    margin: 20px;
    padding: 15px;
    border: 1px solid #333;
}
</style>
</head>

<body>

<header>
<h1>📻 Rádio Palavra viva - WEB</h1>
<p>Levando a palavra de Deus ao mundo</p>
</header>

<!-- PLAYER -->
<div class="section">
<h2>🔴 AO VIVO</h2>

<audio id="player" controls autoplay>
    <source src="https://running-folk-mating-writes.trycloudflare.com/stream" type="audio/mpeg">
</audio>

<br>
<button onclick="play()">▶️ Play</button>
<button onclick="pause()">⏸️ Pause</button>
</div>

<!-- PEDIDO -->
<div class="section">
<h2>🎵 Pedir Música</h2>
<input id="musica" placeholder="Digite a música">
<button onclick="enviarPedido()">Enviar</button>

<div id="listaPedidos"></div>
</div>

<!-- CHAT -->
<div class="section">
<h2>💬 Chat ao Vivo</h2>

<input id="nome" placeholder="Seu nome">
<input id="msg" placeholder="Mensagem">
<button onclick="enviarMsg()">Enviar</button>

<div id="chat"></div>
</div>

<script>
// PLAYER
function play(){
    document.getElementById("player").play();
}

function pause(){
    document.getElementById("player").pause();
}

// 🎵 PEDIDOS (localStorage)
function enviarPedido(){
    let musica = document.getElementById('musica').value;

    if(!musica) return alert("Digite uma música");

    let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
    pedidos.push(musica);

    localStorage.setItem('pedidos', JSON.stringify(pedidos));

    document.getElementById('musica').value = "";
    carregarPedidos();
}

function carregarPedidos(){
    let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];

    let html = "<h3>🎧 Pedidos recentes:</h3>";

    pedidos.slice().reverse().forEach(p=>{
        html += `<p>🎵 ${p}</p>`;
    });

    document.getElementById('listaPedidos').innerHTML = html;
}

// 💬 CHAT (localStorage)
function enviarMsg(){
    let nome = document.getElementById('nome').value;
    let msg = document.getElementById('msg').value;

    if(!nome || !msg) return alert("Preencha tudo");

    let chat = JSON.parse(localStorage.getItem('chat')) || [];

    chat.push({nome, msg});

    localStorage.setItem('chat', JSON.stringify(chat));

    document.getElementById('msg').value = "";
    carregarChat();
}

function carregarChat(){
    let chat = JSON.parse(localStorage.getItem('chat')) || [];

    let html = "";
    chat.forEach(m=>{
        html += `<p><b>${m.nome}:</b> ${m.msg}</p>`;
    });

    document.getElementById('chat').innerHTML = html;
}

// AUTO LOAD
setInterval(carregarChat, 1000);
setInterval(carregarPedidos, 2000);

carregarChat();
carregarPedidos();
</script>

</body>
</html>
